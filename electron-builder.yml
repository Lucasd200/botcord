appId: dev.botcord.app
productName: Botcord
copyright: Copyright © 2026 Lucas
directories:
  output: release
  buildResources: build
# Ad-hoc sign the macOS .app after packing so downloaded builds open via
# right-click > Open instead of failing with a "damaged" Gatekeeper error.
afterPack: scripts/after-pack.js
files:
  - out/**/*
  - package.json
  - "!**/*.map"
asarUnpack:
  - "**/*.node"
  - "**/ffmpeg-static/**"
  # yt-dlp ships as a per-platform executable that must be spawned from disk,
  # so it cannot live inside the asar archive.
  - "**/youtube-dl-exec/bin/**"
publish:
  provider: github
  owner: Lucasd200
  repo: botcord
  releaseType: release
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Botcord
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  category: public.app-category.social-networking
  # zip drives electron-updater (always built in CI). dmg is the nice download
  # — built best-effort in CI and reliably by `npm run dist:mac` on a real Mac.
  # ffmpeg ships inside the .app via ffmpeg-static, so music works from the dmg.
  target:
    - target: zip
      arch:
        - x64
        - arm64
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
dmg:
  title: Botcord ${version}
  artifactName: ${productName}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: build/icon.png
  maintainer: Lucas
  artifactName: ${productName}-${version}-${arch}.${ext}
