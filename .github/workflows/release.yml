name: Release

# Build the Windows + macOS installers and publish them (with the auto-update
# metadata electron-updater needs) to a GitHub Release. Triggered by pushing a
# version tag like v2.1.0, or run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # @discordjs/voice pulls in @snazzah/davey, a NAPI module whose native
      # binding ships as a per-platform optional dependency. `npm ci` only
      # installs the binding matching the *runner's* arch, but `electron-builder
      # --mac` builds BOTH the arm64 and x64 zips. Since macos-latest is an
      # Apple Silicon (arm64) runner, the x64 zip would otherwise be packaged
      # with the arm64 binding and crash on launch with "Cannot find native
      # binding". Force-install the x64 binding (matching the resolved davey
      # version) so the cross-arch macOS build has the binding it needs.
      - name: Add cross-arch macOS native binding
        if: matrix.os == 'macos-latest'
        run: |
          DAVEY_VER="$(node -p "require('@snazzah/davey/package.json').version")"
          echo "Installing @snazzah/davey-darwin-x64@${DAVEY_VER} for the x64 build"
          npm install --no-save --os=darwin --cpu=x64 "@snazzah/davey-darwin-x64@${DAVEY_VER}"

      - name: Build bundles
        run: npm run build

      - name: Publish Windows installer
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish macOS installer
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
